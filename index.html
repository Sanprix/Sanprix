<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanprix Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{background:#fff;color:#111;}

/* NAVBAR */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
border-bottom:1px solid #eee;
}

.logo{font-weight:700;font-size:20px;}

.icons{
display:flex;
gap:15px;
}

/* HERO */
.hero{
height:90vh;
background:url("bg.jpg") center/cover no-repeat;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

.hero h1{
font-size:32px;
margin-bottom:10px;
}

.hero button{
padding:10px 20px;
border:1px solid white;
background:transparent;
color:white;
cursor:pointer;
}

/* PRODUCTS */
.section-title{
padding:20px;
font-weight:600;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:20px;
}

.card{
background:#fafafa;
border-radius:10px;
overflow:hidden;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card h4{
padding:10px;
font-size:14px;
}

.price{
padding:0 10px;
font-size:13px;
color:#666;
}

.card button{
margin:10px;
padding:8px;
background:black;
color:white;
border:none;
width:90%;
}

/* CART */
.cart{
padding:20px;
border-top:1px solid #eee;
text-align:center;
}

.cart button{
margin:5px;
padding:10px;
border:none;
background:black;
color:white;
}

/* ADMIN */
.admin{
padding:20px;
background:#f5f5f5;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border:1px solid #ddd;
}

/* FOOTER */
footer{
padding:20px;
text-align:center;
font-size:12px;
color:#777;
}

/* MOBILE */
@media(max-width:600px){
.grid{grid-template-columns:1fr;}
.hero h1{font-size:24px;}
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<div class="logo">Sanprix</div>
<div class="icons">🛒 👤</div>
</nav>

<!-- HERO -->
<div class="hero">
<h1>Browse our latest products</h1>
<button onclick="scrollToProducts()">Shop all</button>
</div>

<!-- PRODUCTS -->
<h3 class="section-title">Products</h3>
<div class="grid" id="products"></div>

<!-- CART -->
<div class="cart">
<h3>Total ₹ <span id="total">0</span></h3>
<button onclick="pay()">Pay with UPI</button>
<button onclick="whatsapp()">Order WhatsApp</button>
</div>

<!-- ADMIN -->
<div class="admin">
<h3>Add Product</h3>
<input id="name" placeholder="Product name">
<input id="price" placeholder="Price">
<input id="img" placeholder="Image link">
<button onclick="add()">Add Product</button>
</div>

<!-- FOOTER -->
<footer>
© 2026 Sanprix | Contact: 9313233801 | Instagram: prem_8155
</footer>

<script>
let total=0;

let data=JSON.parse(localStorage.getItem("data"))||[
{name:"Black T-shirt",price:499,img:"https://source.unsplash.com/400x400/?black-tshirt"},
{name:"White T-shirt",price:599,img:"https://source.unsplash.com/400x400/?white-tshirt"},
{name:"Stylish Shirt",price:799,img:"https://source.unsplash.com/400x400/?fashion-shirt"}
];

function show(){
let html="";
data.forEach(p=>{
html+=`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p class="price">₹${p.price}</p>
<button onclick="addCart(${p.price})">Add to cart</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

function addCart(p){
total+=p;
document.getElementById("total").innerText=total;
}

function pay(){
window.location.href="upi://pay?pa=pkchaudhary8585-5@oksbi&pn=Sanprix&am="+total+"&cu=INR";
}

function whatsapp(){
window.open("https://wa.me/919313233801?text=Order ₹"+total);
}

function add(){
let n=document.getElementById("name").value;
let p=document.getElementById("price").value;
let i=document.getElementById("img").value;

if(n && p && i){
data.push({name:n,price:p,img:i});
localStorage.setItem("data",JSON.stringify(data));
show();
}
}

function scrollToProducts(){
window.scrollTo({top:500,behavior:"smooth"});
}

show();
</script>

</body>
</html>
