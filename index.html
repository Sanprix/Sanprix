<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanprix Store</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{background:#f5f5f5;}

/* NAV */
nav{
display:flex;justify-content:space-between;
padding:15px;background:white;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* HERO */
.hero{
height:200px;
background:#000;color:white;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
}

/* PRODUCTS */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;padding:20px;
}

.card{
background:white;padding:10px;
border-radius:10px;text-align:center;
}

button{
padding:8px 12px;margin-top:5px;
border:none;background:black;color:white;
cursor:pointer;
}

/* CART */
.cart{
background:white;margin:20px;padding:15px;
border-radius:10px;
}

/* ADMIN */
.admin{
background:#222;color:white;
padding:15px;margin:20px;
border-radius:10px;
}

input{
padding:8px;margin:5px;width:100%;
}
</style>
</head>

<body>

<nav>
<div>Sanprix Store</div>
</nav>

<div class="hero">
<h2>Shop Now</h2>
</div>

<!-- PRODUCTS -->
<div class="grid" id="productList"></div>

<!-- CART -->
<div class="cart">
<h3>Total: ₹ <span id="total">0</span></h3>

<button onclick="payUPI()">Pay with UPI</button>
<button onclick="orderWhatsApp()">Order on WhatsApp</button>
</div>

<!-- ADMIN PANEL -->
<div class="admin">
<h3>Admin Panel</h3>

<input type="text" id="name" placeholder="Product Name">
<input type="number" id="price" placeholder="Price">

<button onclick="addProduct()">Add Product</button>
</div>

<script>
let total = 0;
let products = JSON.parse(localStorage.getItem("products")) || [
{name:"Black T-shirt", price:499},
{name:"White T-shirt", price:599}
];

function showProducts(){
let html = "";
products.forEach((p,i)=>{
html += `
<div class="card">
<p>${p.name}</p>
<p>₹${p.price}</p>
<button onclick="addToCart(${p.price})">Add</button>
</div>`;
});
document.getElementById("productList").innerHTML = html;
}

function addToCart(price){
total += price;
document.getElementById("total").innerText = total;
}

function payUPI(){
let upi = "upi://pay?pa=pkchaudhary8585-5@oksbi&pn=Sanprix&am="+total+"&cu=INR";
window.location.href = upi;
}

function orderWhatsApp(){
let msg = "Order Total = ₹"+total;
window.open("https://wa.me/919313233801?text="+encodeURIComponent(msg));
}

function addProduct(){
let name = document.getElementById("name").value;
let price = document.getElementById("price").value;

if(name && price){
products.push({name,price});
localStorage.setItem("products", JSON.stringify(products));
showProducts();
}
}

showProducts();
</script>

</body>
</html>
