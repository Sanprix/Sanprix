<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanprix Store</title>

<style>
body{font-family:sans-serif;margin:0;background:#f5f5f5;}
nav{padding:15px;background:black;color:white;text-align:center;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px;}
.card{background:white;padding:10px;border-radius:10px;text-align:center;}
img{width:100%;border-radius:10px;}
button{padding:10px;margin-top:5px;border:none;background:black;color:white;}
</style>
</head>

<body>

<nav>Sanprix Store</nav>

<div class="grid" id="products"></div>

<script>
let data = JSON.parse(localStorage.getItem("products")) || [
{name:"T-shirt",price:499,img:"https://source.unsplash.com/400x400/?tshirt"}
];

function show(){
let html="";
data.forEach((p,i)=>{
html+=`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>₹${p.price}</p>
<button onclick="buy(${i})">Buy Now</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

function buy(i){
localStorage.setItem("buy",JSON.stringify(data[i]));
window.location.href="checkout.html";
}

show();
</script>

</body>
</html>
