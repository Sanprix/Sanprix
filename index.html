<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SanPrix - Personal Brand</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #0d0d0d, #1a1a1a);
    color: white;
}

nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
}

.logo svg {
    height: 40px;
}

nav a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
    transition: 0.3s;
}

nav a:hover {
    color: gold;
}

.hero {
    height: 90vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    animation: fadeIn 2s ease;
}

.hero h1 {
    font-size: 60px;
}

.hero span {
    color: gold;
}

.hero p {
    margin: 15px 0;
    color: #aaa;
}

.btn {
    padding: 12px 30px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(45deg, gold, orange);
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
}

.services {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 60px;
    flex-wrap: wrap;
}

.card {
    padding: 25px;
    width: 250px;
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px gold;
}

.contact {
    text-align: center;
    padding: 50px;
}

input, textarea {
    width: 300px;
    margin: 10px;
    padding: 12px;
    border: none;
    border-radius: 8px;
}

.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px 18px;
    border-radius: 50%;
    text-decoration: none;
    font-size: 20px;
    box-shadow: 0 0 15px #25D366;
}

footer {
    text-align: center;
    padding: 20px;
    background: black;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>

</head>

<body>

<nav>
    <div class="logo">
        <svg viewBox="0 0 300 80">
            <text x="0" y="50" font-size="40" fill="gold" font-weight="bold">
                SanPrix
            </text>
        </svg>
    </div>

    <div>
        <a href="#">Home</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </div>
</nav>

<section class="hero">
    <div>
        <h1>I am <span>Pravin</span></h1>
        <p>Building a strong personal brand & earning online 🚀</p>
        <button class="btn">Follow Me</button>
    </div>
</section>

<section class="services">
    <div class="card">
        <h3>YouTube Growth</h3>
        <p>Shorts strategy for fast growth</p>
    </div>
    <div class="card">
        <h3>Online Income</h3>
        <p>Zero investment earning methods</p>
    </div>
    <div class="card">
        <h3>Brand Building</h3>
        <p>Create your identity</p>
    </div>
</section>

<section class="contact">
    <h2>Contact Me</h2>
    <input type="text" placeholder="Your Name"><br>
    <input type="email" placeholder="Your Email"><br>
    <textarea placeholder="Message"></textarea><br>
    <button class="btn">Send</button>
</section>

<a class="whatsapp" href="https://wa.me/919313233801?text=Hello%20Pravin%20I%20want%20to%20know%20more">💬</a>

<footer>
    <p>© 2026 SanPrix. All rights reserved.</p>
</footer>

</body>
</html>
