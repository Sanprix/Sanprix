<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>
</head>

<body style="font-family:sans-serif;padding:20px;">

<h2>Checkout</h2>

<p id="name"></p>
<p id="price"></p>

<input id="n" placeholder="Name"><br>
<input id="p" placeholder="Phone"><br>
<input id="a" placeholder="Address"><br>

<button onclick="pay()">Pay UPI</button>
<button onclick="order()">Order WhatsApp</button>

<script>
let d=JSON.parse(localStorage.getItem("buy"));

document.getElementById("name").innerText=d.name;
document.getElementById("price").innerText="₹"+d.price;

function pay(){
window.location.href=`upi://pay?pa=pkchaudhary8585-5@oksbi&pn=Sanprix&am=${d.price}&cu=INR`;
}

function order(){
let name=document.getElementById("n").value;
let phone=document.getElementById("p").value;
let address=document.getElementById("a").value;

let msg=`Order\n${d.name} ₹${d.price}\n${name}\n${phone}\n${address}`;

let orders=JSON.parse(localStorage.getItem("orders"))||[];
orders.push({product:d.name,price:d.price,name,phone,address});
localStorage.setItem("orders",JSON.stringify(orders));

window.open("https://wa.me/919313233801?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
